services:
  tuvi-db:
    image: postgres:16-alpine
    container_name: tuvi-db
    env_file:
      - .env
    environment:
      - POSTGRES_DB=${POSTGRES_DB:-tuvi}
      - POSTGRES_USER=${POSTGRES_USER:-tuvi}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-tuvi_password}
    volumes:
      - tuvi-postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-tuvi} -d ${POSTGRES_DB:-tuvi}"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: always

  tuvi-app:
    build:
      context: .
      dockerfile: apps/web/Dockerfile.prod
    container_name: tuvi-app
    depends_on:
      tuvi-db:
        condition: service_healthy
    env_file:
      - .env
    ports:
      - "${PRODUCTION_PORT:-8900}:3000"
    environment:
      - NODE_ENV=production
      - PORT=3000
      - DATABASE_URL=postgresql://${POSTGRES_USER:-tuvi}:${POSTGRES_PASSWORD:-tuvi_password}@tuvi-db:5432/${POSTGRES_DB:-tuvi}?schema=public
      - AI_PROVIDER=${AI_PROVIDER:-gemini}
      - GEMINI_MODEL=${GEMINI_MODEL:-gemini-2.0-flash}
      - GROQ_MODEL=${GROQ_MODEL:-llama-3.3-70b-versatile}
    healthcheck:
      test: ["CMD-SHELL", "node -e \"const h=process.env.HOSTNAME||'127.0.0.1';fetch('http://'+h+':3000').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))\""]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s
    restart: always

volumes:
  tuvi-postgres-data:
