services:
  tuvi-app:
    build:
      context: .
      dockerfile: apps/web/Dockerfile.prod
    container_name: tuvi-app
    env_file:
      - .env
    ports:
      - "${PRODUCTION_PORT:-8900}:3000"
    environment:
      - NODE_ENV=production
      - PORT=3000
      - DATABASE_URL=file:/app/apps/web/data/tuvi.db
      - AI_PROVIDER=${AI_PROVIDER:-gemini}
      - GEMINI_MODEL=${GEMINI_MODEL:-gemini-2.0-flash}
      - GROQ_MODEL=${GROQ_MODEL:-llama-3.3-70b-versatile}
    volumes:
      - ./data:/app/apps/web/data
    healthcheck:
      test: ["CMD-SHELL", "node -e \"const h=process.env.HOSTNAME||'127.0.0.1';fetch('http://'+h+':3000').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))\""]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s
    restart: always
