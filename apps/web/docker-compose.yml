version: '3.8'

services:
  tuvi_v2_web:
    build:
      context: .
      dockerfile: Dockerfile.dev
    container_name: tuvi_v2_web
    ports:
      - "8920:3000"
    volumes:
      - .:/app
      - /app/node_modules
      - /app/.next
    environment:
      - NODE_ENV=development
      - PORT=3000
      - CHOKIDAR_USEPOLLING=true
      - WATCHPACK_POLLING=true
      - GEMINI_API_KEY=${GEMINI_API_KEY}
    restart: unless-stopped
