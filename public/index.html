<!DOCTYPE html>
<html lang="vi">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tử Vi & Thần Số Học - Luận Giải Đầy Đủ</title>
    <meta name="description"
        content="Công cụ lập lá số Tử Vi và luận giải Thần Số Học trực tuyến. Phân tích vận mệnh, tính cách, sứ mệnh cuộc đời theo phương pháp Pythagoras.">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Noto+Serif:ital,wght@0,400;0,700;1,400&family=Inter:wght@300;400;500;600;700&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="styles.css?v=10.0">
</head>

<body>
    <div class="print-watermark">Webest.asia - Nguyễn Đức Toàn - Lập trình WEB, APP, AI</div>
    <div class="print-watermark-middle"></div>
    <div class="app-container">
        <!-- Header -->
        <header class="app-header">
            <div class="header-glow"></div>
            <h1 class="header-title">
                <span class="title-icon">紫微</span>
                <span class="title-text">Tử Vi & Thần Số Học</span>
            </h1>
            <p class="header-subtitle">Công cụ lập lá số Tử Vi & luận giải Thần Số Học đầy đủ</p>
        </header>

        <!-- Input Form -->
        <section class="input-section" id="inputSection">
            <div class="form-container">
                <h2 class="form-title">Thông Tin Lập Lá Số</h2>
                <form id="tuViForm" class="tuvi-form">
                    <div class="form-row">
                        <div class="form-group">
                            <label for="hoTen">Họ và Tên</label>
                            <input type="text" id="hoTen" placeholder="Nhập họ tên..." value="Nguyễn Đình Bắc">
                        </div>
                        <div class="form-group">
                            <label for="gioiTinh">Giới Tính</label>
                            <select id="gioiTinh">
                                <option value="nam" selected>Nam</option>
                                <option value="nu">Nữ</option>
                            </select>
                        </div>
                    </div>
                    <div class="form-row">
                        <div class="form-group date-type-group">
                            <label>Loại Lịch</label>
                            <div class="date-type-toggle">
                                <input type="radio" name="dateType" id="dateSolar" value="solar" checked>
                                <label for="dateSolar">Dương Lịch</label>
                                <input type="radio" name="dateType" id="dateLunar" value="lunar">
                                <label for="dateLunar">Âm Lịch</label>
                            </div>
                        </div>
                    </div>
                    <div class="form-row solar-input-group" id="solarInputGroup">
                        <div class="form-group col-3">
                            <label for="solarDay">Ngày</label>
                            <select id="solarDay"></select>
                        </div>
                        <div class="form-group col-3">
                            <label for="solarMonth">Tháng</label>
                            <select id="solarMonth"></select>
                        </div>
                        <div class="form-group col-3">
                            <label for="solarYear">Năm</label>
                            <input type="number" id="solarYear" min="1920" max="2030" value="2004">
                        </div>
                        <div class="form-group">
                            <label>Chuyển sang Âm lịch</label>
                            <div class="lunar-preview" id="lunarPreview">...</div>
                        </div>
                    </div>
                    <div class="form-row lunar-input-group" id="lunarInputGroup" style="display: none;">
                        <div class="form-group col-3">
                            <label for="lDay">Ngày Âm</label>
                            <input type="number" id="lDay" min="1" max="30" value="4">
                        </div>
                        <div class="form-group col-3">
                            <label for="lMonth">Tháng Âm</label>
                            <input type="number" id="lMonth" min="1" max="12" value="7">
                        </div>
                        <div class="form-group col-3">
                            <label for="lYear">Năm Âm</label>
                            <input type="number" id="lYear" min="1900" max="2100" value="2004">
                        </div>
                        <div class="form-group col-3 checkbox-group">
                            <label class="checkbox-label">
                                <input type="checkbox" id="lLeap">
                                <span>Tháng nhuận</span>
                            </label>
                        </div>
                    </div>
                    <div class="form-row">
                        <div class="form-group">
                            <label for="gioSinh">Giờ Sinh (Canh giờ)</label>
                            <select id="gioSinh">
                                <option value="0">Tý (23h-1h)</option>
                                <option value="1">Sửu (1h-3h)</option>
                                <option value="2">Dần (3h-5h)</option>
                                <option value="3" selected>Mão (5h-7h)</option>
                                <option value="4">Thìn (7h-9h)</option>
                                <option value="5">Tỵ (9h-11h)</option>
                                <option value="6">Ngọ (11h-13h)</option>
                                <option value="7">Mùi (13h-15h)</option>
                                <option value="8">Thân (15h-17h)</option>
                                <option value="9">Dậu (17h-19h)</option>
                                <option value="10">Tuất (19h-21h)</option>
                                <option value="11">Hợi (21h-23h)</option>
                            </select>
                        </div>
                    </div>

                    <div class="form-row">
                        <div class="form-group">
                            <label for="namXem">Năm Xem (Lưu niên)</label>
                            <input type="number" id="namXem" value="2026" min="1900" max="2100">
                        </div>
                    </div>
                    <button type="submit" class="btn-submit" id="btnSubmit">
                        <span class="btn-icon">✨</span>
                        <span>Lập Lá Số</span>
                    </button>
                </form>
            </div>
        </section>

        <!-- Results Section with Tabs -->
        <section class="results-section" id="resultsSection" style="display:none;">
            <!-- Tab Navigation -->
            <div class="results-tabs">
                <button class="tab-btn active" id="tabTuVi" data-tab="tuvi">
                    <span class="tab-icon">🔮</span>
                    <span class="tab-label">Tử Vi</span>
                </button>
                <button class="tab-btn" id="tabTSH" data-tab="thanSoHoc">
                    <span class="tab-icon">🔢</span>
                    <span class="tab-label">Thần Số Học</span>
                </button>
            </div>

            <!-- Back/Print Actions -->
            <div class="chart-actions">
                <button class="btn-back" id="btnBack">← Nhập lại</button>
                <button class="btn-rawdata" id="btnRawdata" style="display:none;">📋 Xem Rawdata</button>
                <button class="btn-download" id="btnDownload">📷 Tải Ảnh</button>
                <button class="btn-print" id="btnPrint">🖨️ In kết quả</button>
            </div>

            <!-- Rawdata Modal -->
            <div class="rawdata-modal" id="rawdataModal" style="display:none;">
                <div class="rawdata-modal-content">
                    <div class="rawdata-modal-header">
                        <h3>📋 Raw Data - Lá Số Tử Vi</h3>
                        <div class="rawdata-modal-actions">
                            <button class="rawdata-copy-btn" id="rawdataCopyBtn">📋 Copy</button>
                            <button class="rawdata-close-btn" id="rawdataCloseBtn">✕</button>
                        </div>
                    </div>
                    <p class="rawdata-hint">Copy data bên dưới → dán vào ChatGPT/Gemini để luận giải chi tiết</p>
                    <textarea class="rawdata-textarea" id="rawdataTextarea" readonly></textarea>
                </div>
            </div>

            <!-- Tab: Tử Vi -->
            <div class="tab-content active" id="tabContentTuVi" data-tab-content="tuvi">
                <div class="chart-wrapper" id="chartWrapper">
                    <!-- The 4x4 grid chart will be rendered here by JS -->
                </div>
                <!-- Interpretation Section -->
                <div class="interpretation-section" id="interpretationSection">
                    <h2 class="section-title">📖 Diễn Giải Lá Số</h2>
                    <div id="interpretationContent" class="interpretation-content">
                        <!-- Rendered by JS -->
                    </div>
                </div>
            </div>

            <!-- Tab: Thần Số Học -->
            <div class="tab-content" id="tabContentTSH" data-tab-content="thanSoHoc">
                <div class="tsh-container" id="tshContainer">
                    <!-- Rendered by ThanSoHocRender.render() -->
                </div>
            </div>
        </section>
    </div>

    <script src="html2canvas.min.js"></script>
    <script src="auth.js"></script>
    <script src="am-lich.js"></script>
    <script src="tu-vi-calc.js"></script>
    <script src="tu-vi-sao.js"></script>
    <script src="tu-vi-dai-van-hoa.js"></script>
    <script src="tu-vi-tinh-he.js"></script>
    <script src="tu-vi-star-patterns.js"></script>
    <script src="tu-vi-event-rules.js"></script>
    <script src="tu-vi-templates.js"></script>
    <script src="tu-vi-event-scanner.js"></script>
    <script src="tu-vi-luu-nien.js"></script>
    <script src="tu-vi-render.js"></script>
    <script src="tu-vi-interpret.js?v=10.0"></script>
    <script src="than-so-hoc.js"></script>
    <script src="than-so-hoc-data.js"></script>
    <script src="than-so-hoc-render.js"></script>
    <script src="app.js?v=10.0"></script>
</body>

</html>
